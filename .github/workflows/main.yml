name: WoW Inven Scraper

on:
  schedule:
    # 10분마다 실행되도록 설정 (UTC 기준)
    - cron: '*/10 * * * *'
  workflow_dispatch: # 수동 실행 버튼 활성화

permissions:
  contents: write # last_id.txt 파일을 업데이트하기 위한 권한

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
    - name: 저장소 코드 가져오기
      uses: actions/checkout@v3

    - name: 파이썬 환경 설정
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: 필요 라이브러리 설치
      run: |
        pip install requests beautifulsoup4

    - name: 크롤러 스크립트 실행
      env:
        DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
      run: python scraper.py

    - name: 변경된 last_id.txt 저장 (커밋)
      run: |
        git config --global user.email "actions@github.com"
        git config --global user.name "GitHub Actions"
        git add last_id.txt
        git diff --quiet && git diff --staged --quiet || (git commit -m "Update last_id" && git push)
